      <section class="section-cta" id="section-cta">
        <div class="container">
          <div class="cta-form-box">
            <span class="subheading">Contact us</span>
            <h2 class="heading-secondary">Get in touch</h2>
            <form
              class="cta-form"
              method="POST"
              name="contact"
              data-netlify="true"
            >
              <input type="hidden" name="contact-form" value="Contact Form" />
              <div>
                <label class="cta-form-label" for="input-name"
                  >Full Name <span class="label-required">*</span>
                </label>
                <input
                  type="text"
                  id="input-name"
                  class="input-text"
                  name="fullname"
                  value=""
                  required
                />
              </div>

              <div>
                <label class="cta-form-label" for="input-email"
                  >Email <span class="label-required">*</span></label
                >
                <input
                  type="email"
                  id="input-email"
                  class="input-text"
                  name="emailaddress"
                  value=""
                  required
                />
              </div>

              <div>
                <label class="cta-form-label" for="input-phone"
                  >Phone <span class="label-required">*</span></label
                >
                <input
                  type="tel"
                  id="input-phone"
                  class="input-text"
                  name="phonenumber"
                  value=""
                  required
                />
              </div>

              <div>
                <label class="cta-form-label" for="input-company"
                  >Company <span class="label-required">*</span></label
                >
                <input
                  type="text"
                  id="input-company"
                  class="input-text"
                  name="companyname"
                  value=""
                  required
                />
              </div>

              <fieldset>
                <legend class="cta-form-legend">Location:</legend>
                <input
                  type="radio"
                  class="input-radio"
                  id="input-alaska"
                  name="location"
                  value="Texas Market"
                  checked
                />
                <label for="input-alaska" class="radio-label"
                  >Texas Market</label
                >

                <input
                  type="radio"
                  class="input-radio"
                  id="input-texas"
                  name="location"
                  value="Alaska Market"
                />
                <label for="input-texas" class="radio-label"
                  >Alaska Market</label
                >
              </fieldset>

              <div class="cta-form-message">
                <label class="cta-form-label" for="input-message"
                  >Message <span class="label-required">*</span></label
                >
                <textarea
                  id="input-message"
                  class="input-message"
                  rows="7"
                  name="textmessage"
                  value=""
                  required
                ></textarea>
              </div>

              <button class="btn btn-submit-form" type="submit">
                Submit <i class="ph ph-paper-plane-right ph--mg-top"></i>
              </button>
            </form>
          </div>
        </div>
